# @tailwindcss/oxide ships its native code as per-platform optional packages.
# npm (esp. older versions) has a bug (npm/cli#4828) that leaves the Linux
# binary uninstalled, so `oxide/index.js` throws "Cannot find native binding".
#
# Fix: run the normal install, then EXPLICITLY install the Linux x64 (glibc)
# binary that oxide's require() looks for. Nixpacks uses a Debian/glibc base,
# so `-linux-x64-gnu` is the correct one. --no-save keeps package.json clean.
[phases.install]
cmds = [
  "npm install",
  "npm install --no-save @tailwindcss/oxide-linux-x64-gnu@4.3.3",
]
